    <script type="text/javascript">
        function ShowMessage(message, messagetype, container) {
            var cssclass;
            switch (messagetype) {
                case 'Success':
                    cssclass = 'alert-success'
                    $("#alert_container").empty();
                    $("#alert_container").hide;
                    break;
                case 'Error':
                    cssclass = 'alert-danger'
                    $("#alert_container").show();
                    $('#' + container + '').append('<div id="alert_div" style="margin: 0 0.5%; -webkit-box-shadow: 3px 4px 6px #999;" class="alert fade in ' + cssclass + '"><span>' + message + '</span></div>');
                    break;
                case 'Warning':
                    cssclass = 'alert-warning'
                    $('#' + container + '').append('<div id="alert_div" style="margin: 0 0.5%; -webkit-box-shadow: 3px 4px 6px #999;" class="alert fade in ' + cssclass + '"><span>' + message + '</span></div>');
                    break;
                default:
                    cssclass = 'alert-info'
                    $('#' + container + '').append('<div id="alert_div" style="margin: 0 0.5%; -webkit-box-shadow: 3px 4px 6px #999;" class="alert fade in ' + cssclass + '"><span>' + message + '</span></div>');
            }
            //$('#alert_container').append('<div id="alert_div" style="margin: 0 0.5%; -webkit-box-shadow: 3px 4px 6px #999;" class="alert fade in ' + cssclass + '"><span>' + message + '</span></div>');
            
        }
    </script>
