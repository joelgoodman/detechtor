<!-- ===== function deleteCookieAllScopes - to delete cookie across common scopes & paths ===== -->
<script type="text/javascript">
function deleteCookieAllScopes(name) {
  var exp   = "expires=Thu, 01 Jan 1970 00:00:00 GMT";
  var domains = [location.hostname, ".shr.nevada.edu", ".scsr.nevada.edu", ".nevada.edu"];
  var paths   = ["/", "/psp", "/psc"];

  // domain-scoped deletions
  for (var d = 0; d < domains.length; d++) {
    for (var p = 0; p < paths.length; p++) {
      document.cookie = name + "=; path=" + paths[p] + "; " + exp + "; domain=" + domains[d];
    }
  }
  // host-only deletions (no domain attribute)
  for (var p2 = 0; p2 < paths.length; p2++) {
    document.cookie = name + "=; path=" + paths[p2] + "; " + exp;
  }
}
</script>
<!-- ===== End function deleteCookieAllScopes ===== -->

						/*
							Insert Custom code for Redirect to subsite after signout

						function getCookie_Site_Name(cname) 
						{
						  let name = cname + "=";
						  let decodedCookie = decodeURIComponent(document.cookie);
						  let ca = decodedCookie.split(';');
						  for(let i = 0; i < ca.length; i++) {
							let c = ca[i];
							while (c.charAt(0) == ' ') {
							  c = c.substring(1);
							}
							if (c.indexOf(name) == 0) {
							  return c.substring(name.length, c.length);
							}
						  }
						  return "";
						}

						site_name = getCookie_Site_Name("NSHE_Site_Name");
						
						if (site_name == "CSN" || site_name == "GBC" || site_name == "NSC" || site_name == "TMC" || site_name == "WNC")

							{
