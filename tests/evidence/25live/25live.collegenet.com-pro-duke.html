        <!-- common-js-start --><script type="text/javascript">
    window.ProData = window.ProData || {};
    window.ProData.version = '1776378450415';

    let isHostUriSeries25 = /series25.com/.test(window.location.host);
    window.ProData.isHostUriSeries25 = isHostUriSeries25;

    let saasBranch = location.pathname.split("/").filter(s => s && s.startsWith("25saas-"))[0] || "";
    saasBranch = (saasBranch ? "/" + saasBranch : "");
    let instanceIdWithPrefix = sessionStorage.getItem("series25InstanceOverride") || location.pathname
        .split("/")
        .filter(function(s) {
            s = s && s.toLowerCase && s.toLowerCase();
            return !!s && ["25power", "power", "pro", "groups", "x25", "m25", "scheduling", "reports", "config", "admin", "embedded"].indexOf(s) === -1 &&
                !s.startsWith("25saas-") &&
                (
                    location.host && (
                        (
                            location.host.indexOf("unival") > -1 && s.indexOf("public") === -1 &&
                            !s.includes("25power-")
                        ) || location.host.indexOf("unival") === -1
                    )
                );
        })[0];
    let instanceId = instanceIdWithPrefix.split("-").slice(-1)[0];
    window.ProData.instanceId = instanceId;
    window.ProData.instanceIdWithPrefix = instanceIdWithPrefix;

    let hostname = window.location.hostname
        .replace(/\/25saas-[^\/]+/, "");
    let pathname = window.location.pathname
        .replace(/\/25saas-[^\/]+/, "");
    let port = window.location.port ? ":" + window.location.port : "";

    window.ProData.baseUrl = window.location.protocol + "//" + hostname +
        (pathname.endsWith("/") ? pathname.slice(0, -1) : pathname);

    window.ProData.webservicesBaseUrl = window.location.protocol + "//" + hostname + port +
        (
            isHostUriSeries25
                ? (saasBranch + "/" + instanceId + "/data")
                : (saasBranch + "/25live/data/" + instanceId + "/run")
        );

    window.ProData.initHref = window.location.href + "";
    window.ProData.httpGet = function(url, callback) {
        var xhttp = new XMLHttpRequest();
        xhttp.onreadystatechange = function() {
            if(this.readyState === 4) { //DONE
                callback && callback(this);
            }
        };
        xhttp.open("GET", url, true);
        xhttp.send();
    };

    window.ProData.initCache = {};
    window.ProData.setInitCache = function(url, key) {
        return new Promise((resolve) => {
            window.ProData.httpGet(window.ProData.webservicesBaseUrl + url, function(resp) {
                if(resp && resp.status === 200 && resp.responseText) {
                    let respData = JSON.parse(resp.responseText);
                    window.ProData.initCache[key] = {
                        forcePromise: function() {
                            return window.angBridge.$q.when(respData);
                        }
                    };
                }
                resolve();
            });
        });
    };

    /**
     * /{instanceId}/ping check and redirect to /default if not found
     */
    let pingAndRedirect = function () {
        let pingUrl = window.ProData.webservicesBaseUrl + '/ping.json';
        return window.ProData.httpGet(pingUrl, function(resp) {
            if(resp && resp.status === 404) {
                let instanceId = window.ProData.instanceId;
                let path = window.location.origin + pathname;
                let basePath = path.replace(new RegExp('\/' + instanceId + '.*'), '');

                let msgId = "";
                try {
                    //ANG-6117 - when a school changes their instanceId try to help users find the new instance
                    const data = JSON.parse(resp?.response);
                    msgId = data?.results?.error?.msg_id || "";
                } catch(e) {
                    //error parsing response, fallback to empty msgId
                }

                const newInstanceId = msgId?.startsWith('Redirect:') ? msgId.split(':')[1] : "";

                if (newInstanceId && newInstanceId !== window.ProData.instanceId) {
                    document.head.innerHTML += ` <style>h1 {
                            text-align: center;
                            margin: 0;
                            padding: 0.6em 2em 0.4em;
                            background-color: #1f4485;
                            color: #fff;
                            font-weight: normal;
                            font-size: 1.75em;
                            border-bottom: 2px solid #000;
                        }</style>`;
                    document.body.innerHTML = `
                    <img src="https://collegenet.com/hs-fs/hubfs/Branding/Logos/CN_RGB_800w-1.png?width=200" alt="CollegeNET" />
                            <h1>CollegeNET Series25</h1>
                            <div style="display:flex;flex-direction:column;align-items:center;justify-content:start;height:100vh;margin-top:3em;">
                                <h2>'${instanceId}' has Moved</h2>
                                <p>The 25Live instance you are trying to access has moved to <strong>${newInstanceId}</strong>.</p>
                                <p>Please update your bookmarks to the new location:</p>
                                <a href="${basePath}/${newInstanceId}">${basePath}/${newInstanceId}</a>
                            </div>
                        `;
                } else if (instanceId !== "default") {
                    let defaultUrl = basePath + "/default";
                    window.location.replace(defaultUrl);
                }
            }
        });
    };

    // ANG-6448: Ensure the initial call runs sequentially to set a single cookie and establish a reliable sessionId
    window.ProData.setInitCache("/instcss/data.json?caller=pro-InstCssService.getInstCss", "InstCssService.getInstCss")
        .then(() => {
            if (!window.ProData.embedded) pingAndRedirect();
        })
        .catch(() => {
            if (!window.ProData.embedded) pingAndRedirect();
        });
</script>
